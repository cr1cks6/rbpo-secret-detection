web-fuzzing:
    name: Web Fuzzing with FFuF
    # Мы можем запустить это только если есть собранный JAR (из лабы 2 или 5)
    # Если ты делаешь это в новом репо, просто добавь шаг сборки JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Устанавливаем Java, чтобы запустить наше приложение
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 2. Собираем приложение (или скачиваем артефакт, если он есть)
      - name: Build JAR
        run: chmod +x mvnw && ./mvnw clean package -DskipTests

      # 3. Запускаем приложение в фоновом режиме
      - name: Run App
        run: |
          java -jar target/*.jar &
          sleep 30 # Ждем запуска

      # 4. Запускаем фаззинг (используем Docker-образ FFuF)
      - name: Run FFuF
        run: |
          docker run --rm --network="host" -v $(pwd):/mnt ffuf/ffuf \
          -w /mnt/wordlist.txt \
          -u http://localhost:8080/FUZZ \
          -o /mnt/fuzz-results.json
          
      # 5. Сохраняем результаты
      - name: Upload Fuzzing Results
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-report
          path: fuzz-results.json