name: Secrets and Fuzzing Pipeline

on: [push, pull_request]

jobs:
  # 1. Поиск секретов (уже работает)
  scan-secrets:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Фаззинг (теперь без зависимости от Java-кода)
  web-fuzzing:
    name: Web Fuzzing with FFuF
    needs: scan-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Test Web Server
        run: |
          # Создаем пару папок для вида, чтобы фаззер их нашел
          mkdir -p api admin login
          # Запускаем простейший сервер на Python (он встроен в Linux)
          python3 -m http.server 8080 &
          sleep 5

      - name: Run FFuF (Fuzzing)
        run: |
          # Создаем словарь путей
          echo -e "api\nadmin\nstudents\ncourses\nlogin\nconfig\n.env" > wordlist.txt
          
          # Запускаем фаззер против нашего сервера
          docker run --rm --network="host" -v $(pwd):/mnt ffuf/ffuf \
          -w /mnt/wordlist.txt \
          -u http://localhost:8080/FUZZ \
          -o /mnt/fuzz-results.json

      - name: Upload Fuzzing Results
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-report
          path: fuzz-results.json