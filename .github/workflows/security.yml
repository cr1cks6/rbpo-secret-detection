name: Secrets and Fuzzing Pipeline

on: [push, pull_request]

jobs:
  # 1. Поиск секретов (уже работает отлично)
  scan-secrets:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Веб-фаззинг (Доп. задание 2)
  web-fuzzing:
    name: Web Fuzzing with FFuF
    needs: scan-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Создаем тестовую среду (имитируем сайт)
      - name: Setup Mock Web Site
        run: |
          mkdir -p site/api site/admin site/login
          echo "Welcome" > site/index.html
          # Запускаем сервер на порту 8080
          python3 -m http.server 8080 --directory site &
          sleep 5

      # Устанавливаем FFuF напрямую (это надежнее Docker в CI)
      - name: Install FFuF
        run: |
          wget https://github.com/ffuf/ffuf/releases/download/v2.1.0/ffuf_2.1.0_linux_amd64.tar.gz
          tar -xf ffuf_2.1.0_linux_amd64.tar.gz
          chmod +x ffuf
          sudo mv ffuf /usr/local/bin/

      # Запускаем фаззинг
      - name: Run Fuzzing Scan
        run: |
          # Создаем словарь
          echo -e "api\nadmin\nlogin\nconfig\n.env\nserver-status" > wordlist.txt
          
          # Фаззим наш сервер
          ffuf -w wordlist.txt -u http://localhost:8080/FUZZ -o fuzz-results.json

      # Сохраняем отчет
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-report
          path: fuzz-results.json