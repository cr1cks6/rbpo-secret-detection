name: Full Security and Container Pipeline

on: [push, pull_request]

jobs:
  # 1. Поиск секретов (уже работает)
  scan-secrets:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Безопасность контейнера (Доп. задание 3)
  docker-security:
    name: Docker Build, Scan and Push
    needs: scan-secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Нужно для публикации в реестр
    steps:
      - uses: actions/checkout@v4

      # Сборка образа локально
      - name: Build Docker Image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/myapp:latest .

      # СКАНЕР TRIVY: Ищет уязвимости
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/myapp:latest'
          format: 'table'
          # ОСТАНАВЛИВАТЬ СБОРКУ (exit code 1), если найдены КРИТИЧЕСКИЕ уязвимости
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      # ПУБЛИКАЦИЯ: Выполнится только если Trivy не нашел критических дыр
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Image to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/myapp:latest

  # 3. Фаззинг (уже работает)
  web-fuzzing:
    name: Web Fuzzing with FFuF
    needs: docker-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Fuzzing
        run: |
          mkdir site && echo "Fuzz Test" > site/index.html
          python3 -m http.server 8080 --directory site &
          sleep 5
          wget https://github.com/ffuf/ffuf/releases/download/v2.1.0/ffuf_2.1.0_linux_amd64.tar.gz
          tar -xf ffuf_2.1.0_linux_amd64.tar.gz
          ./ffuf -w <(echo -e "api\nadmin\nlogin") -u http://localhost:8080/FUZZ -o fuzz-results.json